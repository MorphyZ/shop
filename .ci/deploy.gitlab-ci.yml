.deploy_base:
  stage: deploy
  image: docker:20-cli
  before_script:
    - apk add --no-cache openssh-client rsync
    - test -n "$SSH_USER"
    - test -n "$SSH_DIR"
    - test -n "$DEPLOY_PROJECT"
    - TARGET_HOST="${SSH_HOST:-$DEPLOY_HOST}"
    - test -n "$TARGET_HOST"
    - export TARGET_HOST
    - eval "$(ssh-agent -s)"
    - |
      if [ -n "$SSH_PRIVATE_KEY" ]; then
        if [ -f "$SSH_PRIVATE_KEY" ]; then
          # File-type CI variable: value is a path to key file
          chmod 600 "$SSH_PRIVATE_KEY"
          ssh-add "$SSH_PRIVATE_KEY"
        else
          # Text CI variable: value is the key content
          printf '%s\n' "$SSH_PRIVATE_KEY" | sed 's/\r$//' > ~/.ssh/id_ci
          chmod 600 ~/.ssh/id_ci
          ssh-add ~/.ssh/id_ci
        fi
      else
        echo "SSH_PRIVATE_KEY is not set. Using runner SSH auth."
      fi
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -p "${SSH_PORT:-22}" -H "$TARGET_HOST" >> ~/.ssh/known_hosts
  script:
    - |
      if [ "$DEPLOY_ENVIRONMENT" = "production" ]; then
        COMPOSE_FILE="docker-compose.prod.yml"
      else
        COMPOSE_FILE="docker-compose.dev.yml"
      fi
      export COMPOSE_FILE
    - export DEPLOY_PATH="$SSH_DIR/$DEPLOY_PROJECT"
    - |
      cat > .deploy.env <<EOF
      CI_REGISTRY_IMAGE=$CI_REGISTRY_IMAGE
      DOCKER_TAG=$DOCKER_TAG
      EOF
    - ssh "$SSH_USER@$TARGET_HOST" -p "${SSH_PORT:-22}" "mkdir -p '$DEPLOY_PATH/conf.dev' '$DEPLOY_PATH/conf.prod'"
    - rsync -az --delete --exclude '.git' --exclude '.venv' --exclude 'frontend/node_modules' ./ "$SSH_USER@$TARGET_HOST:$DEPLOY_PATH/"
    - scp -P "${SSH_PORT:-22}" .deploy.env "$SSH_USER@$TARGET_HOST:$DEPLOY_PATH/.env"
    - !reference [.remote_docker_login, script]
    - |
      ssh "$SSH_USER@$TARGET_HOST" -p "${SSH_PORT:-22}" "
        cd '$DEPLOY_PATH' &&
        docker compose --project-name '$DEPLOY_PROJECT' -f '$COMPOSE_FILE' pull &&
        docker compose --project-name '$DEPLOY_PROJECT' -f '$COMPOSE_FILE' up -d --remove-orphans
      "

# Required variables in GitLab CI/CD:
# CI_REGISTRY_IMAGE (predefined), SSH_USER, SSH_HOST or DEPLOY_HOST, SSH_PORT, SSH_DIR, DEPLOY_PROJECT, SSH_PRIVATE_KEY

deploy:
  extends: .deploy_base
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+(\.\d+)?$/
      when: manual
