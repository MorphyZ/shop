services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: shop_db
      POSTGRES_USER: shop_user
      POSTGRES_PASSWORD: shop_pass
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shop_user -d shop_db"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    image: ${CI_REGISTRY_IMAGE:-local/shop}/backend:${DOCKER_TAG:-main}
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      DJANGO_SECRET_KEY: change-me
      POSTGRES_DB: shop_db
      POSTGRES_USER: shop_user
      POSTGRES_PASSWORD: shop_pass
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      USE_SQLITE: 0
      LOAD_DEMO_DATA: 1
      DEBUG: 1
      ALLOWED_HOSTS: 127.0.0.1,localhost,backend,nginx
      CORS_ALLOWED_ORIGINS: http://localhost:8005
      CSRF_TRUSTED_ORIGINS: http://localhost:8005
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"

  frontend:
    image: ${CI_REGISTRY_IMAGE:-local/shop}/frontend:${DOCKER_TAG:-main}
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: prod
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "8005:80"
    volumes:
      - ./conf.dev/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  pg_data:
